name: Vercel Prebuilt Deploy

on:
  push:
    branches:
      - canary
  workflow_dispatch:
    inputs:
      target_environment:
        description: Vercel environment to deploy
        required: true
        default: production
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'production' }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.11.1
  TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'production' }}
  VERCEL: '1'
  VERCEL_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'production' }}
  NEXT_PUBLIC_VERCEL_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'production' }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'production' }} prebuilt output
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: true

      - name: Restore build caches
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .vercel/cache
          key: ${{ runner.os }}-vercel-prebuilt-${{ env.TARGET_ENVIRONMENT }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-vercel-prebuilt-${{ env.TARGET_ENVIRONMENT }}-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-vercel-prebuilt-${{ env.TARGET_ENVIRONMENT }}-

      - name: Validate Vercel secrets
        env:
          APP_URL_PREVIEW: ${{ secrets.APP_URL_PREVIEW }}
          APP_URL_PRODUCTION: ${{ secrets.APP_URL_PRODUCTION }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          missing=0

          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID APP_URL_PRODUCTION; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not configured"
              missing=1
            fi
          done

          if [ "$TARGET_ENVIRONMENT" = "preview" ] && [ -z "$APP_URL_PREVIEW" ]; then
            echo "::notice::APP_URL_PREVIEW is not configured; preview builds will fall back to Vercel-resolved URLs"
          fi

          exit "$missing"

      - name: Resolve APP_URL
        env:
          APP_URL_PREVIEW: ${{ secrets.APP_URL_PREVIEW }}
          APP_URL_PRODUCTION: ${{ secrets.APP_URL_PRODUCTION }}
        run: |
          if [ "$TARGET_ENVIRONMENT" = "production" ]; then
            echo "APP_URL=$APP_URL_PRODUCTION" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -n "$APP_URL_PREVIEW" ]; then
            echo "APP_URL=$APP_URL_PREVIEW" >> "$GITHUB_ENV"
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment="$TARGET_ENVIRONMENT" --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          run_vercel_build() {
            if [ "$TARGET_ENVIRONMENT" = "production" ]; then
              vercel build --prod --token="$VERCEL_TOKEN"
            else
              vercel build --token="$VERCEL_TOKEN"
            fi
          }

          if ! run_vercel_build; then
            echo "::warning::Vercel build failed, clearing build caches and retrying once"
            rm -rf .next/cache .vercel/cache
            run_vercel_build
          fi

      - name: Verify prebuilt output
        run: test -d .vercel/output

      - name: Deploy prebuilt output
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deploy_flags=(--prebuilt --archive=tgz --token="$VERCEL_TOKEN")

          if [ "$TARGET_ENVIRONMENT" = "production" ]; then
            deploy_flags+=(--prod)
          fi

          deployment_output="$(vercel deploy "${deploy_flags[@]}")"
          echo "$deployment_output"

          deployment_url="$(echo "$deployment_output" | awk 'NF { line=$0 } END { print line }')"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        run: |
          echo "## Vercel Prebuilt Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`$TARGET_ENVIRONMENT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
