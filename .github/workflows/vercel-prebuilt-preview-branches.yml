name: Vercel Prebuilt Branch Preview Deploy

on:
  push:
    branches-ignore:
      - canary
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag, or SHA to build. Leave empty to use the selected workflow branch.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.11.1
  TARGET_ENVIRONMENT: preview
  VERCEL: '1'
  VERCEL_ENV: preview
  NEXT_PUBLIC_VERCEL_ENV: preview
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy preview prebuilt output
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate Vercel secrets
        env:
          APP_URL_PREVIEW: ${{ secrets.APP_URL_PREVIEW }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          missing=0

          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is not configured"
              missing=1
            fi
          done

          if [ -z "$APP_URL_PREVIEW" ]; then
            echo "::notice::APP_URL_PREVIEW is not configured; preview builds will fall back to Vercel-resolved URLs"
          fi

          exit "$missing"

      - name: Resolve source ref
        id: source_ref
        env:
          INPUT_GIT_REF: ${{ inputs.git_ref }}
        run: |
          if [ -n "$INPUT_GIT_REF" ]; then
            source_ref="$INPUT_GIT_REF"
          else
            source_ref="${GITHUB_REF_NAME}"
          fi

          echo "value=$source_ref" >> "$GITHUB_OUTPUT"

      - name: Resolve source sha
        id: source_sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve APP_URL
        env:
          APP_URL_PREVIEW: ${{ secrets.APP_URL_PREVIEW }}
        run: |
          if [ -n "$APP_URL_PREVIEW" ]; then
            echo "APP_URL=$APP_URL_PREVIEW" >> "$GITHUB_ENV"
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment="$TARGET_ENVIRONMENT" --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Verify prebuilt output
        run: test -d .vercel/output

      - name: Deploy prebuilt output
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_output="$(vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")"
          echo "$deployment_output"

          deployment_url="$(echo "$deployment_output" | awk 'NF { line=$0 } END { print line }')"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        run: |
          echo "## Vercel Prebuilt Branch Preview Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source Ref: \`${{ steps.source_ref.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ steps.source_sha.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deployment: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- APP_URL Source: ${{ secrets.APP_URL_PREVIEW != '' && 'APP_URL_PREVIEW secret' || 'Vercel runtime fallback' }}" >> "$GITHUB_STEP_SUMMARY"
